spring.application.name=CentrosNetApi

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${MYSQL_URL:${DB_URL:jdbc:mysql://localhost:3306/PentaNet}}
spring.datasource.username=${MYSQLUSER:${DB_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:toor}}

server.address=0.0.0.0
server.port=${PORT:9999}

# habilitar/deshabilitar api-docs - swagger-ui
springdoc.api-docs.enabled = true
springdoc.swagger-ui.enabled=true

# definir la ruta de swagger-ui
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ======================
# JWT CONFIG
# ======================
jwt.secret=${JWT_SECRET:PentaNetSuperSecretKey_MustBeAtLeast32BytesLong!!}
jwt.expiration=86400000

#http://localhost:9999/doc/swagger-ui.html


