spring.application.name=CentrosNetApi

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:PentaNet}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:${MYSQLUSER:${DB_USERNAME:root}}}
spring.datasource.password=${MYSQL_PASSWORD:${MYSQLPASSWORD:${DB_PASSWORD:toor}}}

spring.jpa.hibernate.ddl-auto=update

server.address=0.0.0.0
server.port=${PORT:8080}

# habilitar/deshabilitar api-docs - swagger-ui
springdoc.api-docs.enabled = true
springdoc.swagger-ui.enabled=true

# definir la ruta de swagger-ui
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ======================
# JWT CONFIG
# ======================
jwt.secret=${JWT_SECRET:PentaNetSuperSecretKey_MustBeAtLeast32BytesLong!!}
jwt.expiration=86400000

#http://localhost:8080/doc/swagger-ui.html

